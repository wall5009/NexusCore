plugins {
    id 'architectury-plugin' version '3.4.162'
    id 'dev.architectury.loom' version '1.13.467' apply false
    id 'com.gradleup.shadow' version '8.3.10' apply false
    id 'io.github.pacifistmc.forgix' version '2.0.0-SNAPSHOT.5.1'
}

// Locked identity values generated by the website. Dependency choices are not
// represented as toggles in this project; unselected APIs/libraries are simply
// absent from the Gradle files and metadata.
ext.minecraftVersion = '1.21.1'
ext.javaVersion = 21
ext.modId = 'nexuscore'
ext.modName = 'NexusCore'
ext.modDescription = 'Cross-loader helpers, builders, diagnostics, and utilities for Minecraft modding.'
ext.modAuthor = 'rollylindenshnizzer'
ext.modLicense = 'ARR'
ext.modVersion = '1.0.0-build.2'
ext.mavenGroup = 'com.rollylindenshnizzer'
ext.archivesBaseName = 'nexuscore'
ext.jeiVersion = '19.27.0.340'
ext.emiVersion = '1.1.24+1.21.1'
ext.reiVersion = '16.0.799'
ext.teamRebornEnergyVersion = '4.1.0'

architectury {
    minecraft = rootProject.minecraftVersion
}

allprojects {
    group = rootProject.mavenGroup
    version = rootProject.modVersion

    repositories {
        maven { url = 'https://maven.fabricmc.net/' }
        maven { url = 'https://maven.architectury.dev/' }
        maven { url = 'https://maven.neoforged.net/releases/' }
        maven { url = 'https://maven.wispforest.io/releases/' }
        maven { url = 'https://maven.su5ed.dev/releases' }
        maven { url = 'https://maven.blamejared.com/' }
        maven { url = 'https://maven.terraformersmc.com/releases/' }
        maven { url = 'https://maven.shedaniel.me/' }
        mavenCentral()
    }
}

forgix {
    autoRun = true
    archiveClassifier = 'all'
    archiveVersion = rootProject.modVersion
    destinationDirectory = layout.buildDirectory.dir('forgix')

    fabric()
    neoforge()
}

subprojects {
    apply plugin: 'java'

    base {
        archivesName = rootProject.archivesBaseName + '-' + project.name
    }

    java {
        toolchain.languageVersion = JavaLanguageVersion.of(rootProject.javaVersion as int)
        withSourcesJar()
    }

    plugins.withId('dev.architectury.loom') {
        loom {
            silentMojangMappingsLicense()
        }

        dependencies {
            minecraft "com.mojang:minecraft:1.21.1"
            mappings loom.officialMojangMappings()
        }
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.release.set(rootProject.javaVersion as int)
    }

    processResources {
        def resourceProperties = [
                version: '1.0.0-build.2',
                mod_id: 'nexuscore',
                mod_name: 'NexusCore',
                mod_description: 'Cross-loader helpers, builders, diagnostics, and utilities for Minecraft modding.',
                mod_author: 'rollylindenshnizzer',
                mod_license: 'ARR',
                minecraft_version: '1.21.1',
                java_version: '21',
                fabric_loader_version: '0.16.14',
                architectury_api_version: '13.0.8',
                fabric_api_version: '0.116.9+1.21.1',
                neoforge_version: '21.1.230',
                owo_lib_version: '0.12.15.1+1.21',
                owo_lib_neoforge_version: '0.12.15-beta.9+1.21',
        ]

        inputs.properties(resourceProperties)

        filesMatching(['fabric.mod.json', 'quilt.mod.json', 'META-INF/mods.toml', 'META-INF/neoforge.mods.toml', 'pack.mcmeta', 'assets/**/*.json']) {
            expand(resourceProperties)
        }
    }
}
