plugins {
    id 'architectury-plugin' version '3.4.162'
    id 'dev.architectury.loom' version '1.13.467' apply false
    id 'com.gradleup.shadow' version '8.3.10' apply false
    id 'io.github.pacifistmc.forgix' version '2.0.0-SNAPSHOT.5.1'
    id 'me.champeau.gradle.japicmp' version '0.4.6' apply false
}

// Locked identity values generated by the website. Dependency choices are not
// represented as toggles in this project; unselected APIs/libraries are simply
// absent from the Gradle files and metadata.
ext.minecraftVersion = '1.21.1'
ext.javaVersion = 21
ext.modId = 'nexuscore'
ext.modName = 'NexusCore'
ext.modDescription = 'Cross-loader helpers, builders, diagnostics, and utilities for Minecraft modding.'
ext.modAuthor = 'rollylindenshnizzer'
ext.modLicense = 'ARR'
ext.modVersion = '1.2.0-build.2'
ext.mavenGroup = 'com.rollylindenshnizzer'
ext.archivesBaseName = 'nexuscore'
ext.jeiVersion = '19.27.0.340'
ext.emiVersion = '1.1.24+1.21.1'
ext.reiVersion = '16.0.799'
ext.teamRebornEnergyVersion = '4.1.0'

architectury {
    minecraft = rootProject.minecraftVersion
}

allprojects {
    group = rootProject.mavenGroup
    version = rootProject.modVersion

    repositories {
        maven { url = 'https://maven.fabricmc.net/' }
        maven { url = 'https://maven.architectury.dev/' }
        maven { url = 'https://maven.neoforged.net/releases/' }
        maven { url = 'https://maven.wispforest.io/releases/' }
        maven { url = 'https://maven.su5ed.dev/releases' }
        maven { url = 'https://maven.blamejared.com/' }
        maven { url = 'https://maven.terraformersmc.com/releases/' }
        maven { url = 'https://maven.shedaniel.me/' }
        mavenCentral()
    }

    configurations.configureEach {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'dev.architectury' && details.requested.name == 'architectury-transformer') {
                details.useVersion '5.2.91'
                details.because '5.2.91 fixes the post-success TransformerRuntime.removeDuplicates shutdown trace seen in GameTest runs.'
            }
        }
    }
}

subprojects {
    apply plugin: 'java'

    base {
        archivesName = rootProject.archivesBaseName + '-' + project.name
    }

    java {
        toolchain.languageVersion = JavaLanguageVersion.of(rootProject.javaVersion as int)
        withSourcesJar()
    }

    plugins.withId('dev.architectury.loom') {
        loom {
            silentMojangMappingsLicense()
        }

        dependencies {
            minecraft "com.mojang:minecraft:1.21.1"
            mappings loom.officialMojangMappings()
        }
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.release.set(rootProject.javaVersion as int)
    }

    processResources {
        def resourceProperties = [
                version: '1.2.0-build.2',
                mod_id: 'nexuscore',
                mod_name: 'NexusCore',
                mod_description: 'Cross-loader helpers, builders, diagnostics, and utilities for Minecraft modding.',
                mod_author: 'rollylindenshnizzer',
                mod_license: 'ARR',
                minecraft_version: '1.21.1',
                java_version: '21',
                fabric_loader_version: '0.16.14',
                architectury_api_version: '13.0.8',
                fabric_api_version: '0.116.9+1.21.1',
                neoforge_version: '21.1.230',
                owo_lib_version: '0.12.15.1+1.21',
                owo_lib_neoforge_version: '0.12.15-beta.9+1.21',
        ]

        inputs.properties(resourceProperties)

        filesMatching(['fabric.mod.json', 'quilt.mod.json', 'META-INF/mods.toml', 'META-INF/neoforge.mods.toml', 'pack.mcmeta', 'assets/**/*.json']) {
            expand(resourceProperties)
        }
    }
}

tasks.register('generateApiSurfaceReport') {
    group = 'nexus'
    description = 'Writes a simple stable API surface report for release review.'
    outputs.file(layout.buildDirectory.file('reports/nexus/api-surface.txt'))
    doLast {
        def sourceRoot = file('common/src/main/java')
        def out = layout.buildDirectory.file('reports/nexus/api-surface.txt').get().asFile
        out.parentFile.mkdirs()
        def lines = []
        fileTree(sourceRoot).matching { include '**/*.java' }.each { file ->
            def rel = sourceRoot.toPath().relativize(file.toPath()).toString().replace(File.separator, '.')
            file.eachLine { line ->
                def trimmed = line.trim()
                if (trimmed.startsWith('public ') || trimmed.startsWith('@NexusStable') || trimmed.startsWith('@NexusExperimental')) {
                    lines << "${rel}: ${trimmed}"
                }
            }
        }
        out.text = lines.sort().join(System.lineSeparator()) + System.lineSeparator()
    }
}

tasks.register('checkStableApiCompatibility') {
    group = 'verification'
    description = 'Fails if stable APIs are missing explicit Nexus stability annotations.'
    dependsOn 'generateApiSurfaceReport'
    doLast {
        def report = layout.buildDirectory.file('reports/nexus/api-surface.txt').get().asFile.text
        if (!report.contains('NexusStable') && !report.contains('NexusExperimental')) {
            throw new GradleException('No Nexus API stability annotations were found in the API report.')
        }
    }
}

def resolveAbiBaselineJar = {
    def explicitBaseline = findProperty('nexusApiBaseline')
    if (explicitBaseline != null && !explicitBaseline.toString().isBlank()) {
        def baseline = file(explicitBaseline.toString())
        if (!baseline.exists()) {
            throw new GradleException("Configured Nexus API baseline does not exist: ${baseline}")
        }
        return baseline
    }

    def version = findProperty('nexusApiBaselineVersion') ?: rootProject.modVersion
    def conventional = file("api-baselines/nexuscore-common-${version}.jar")
    if (conventional.exists()) {
        return conventional
    }

    if (Boolean.parseBoolean(String.valueOf(findProperty('nexusRelease')))) {
        throw new GradleException("Release ABI checks require -PnexusApiBaseline=<jar> or api-baselines/nexuscore-common-${version}.jar")
    }

    logger.lifecycle("No Nexus API baseline jar configured; using the current common jar as a bootstrap baseline. Set -PnexusRelease=true to require a real baseline.")
    return project(':common').tasks.named('jar').get().archiveFile.get().asFile
}

def resolveCurrentAbiJar = { File baseline ->
    if (baseline.name.endsWith('-dev.jar')) {
        return project(':common').tasks.named('jar').get().archiveFile.get().asFile
    }
    def remap = project(':common').tasks.named('remapJar').get()
    return remap.archiveFile.get().asFile
}

tasks.register('checkBinaryCompatibility', me.champeau.gradle.japicmp.JapicmpTask) {
    group = 'verification'
    description = 'Runs JApiCmp binary compatibility enforcement against the configured NexusCore API baseline.'
    dependsOn ':common:jar', ':common:remapJar'
    onlyModified = true
    onlyBinaryIncompatibleModified = true
    failOnModification = true
    ignoreMissingClasses = true
    accessModifier = 'public'
    packageIncludes = ['com.rollylindenshnizzer.nexuscore.*']
    packageExcludes = [
            'com.rollylindenshnizzer.nexuscore.*.internal.*',
            'com.rollylindenshnizzer.nexuscore.fabric.*',
            'com.rollylindenshnizzer.nexuscore.neoforge.*'
    ]
    oldClasspath.from(provider { files(resolveAbiBaselineJar()) })
    newClasspath.from(provider {
        def baseline = resolveAbiBaselineJar()
        files(resolveCurrentAbiJar(baseline))
    })
    oldArchives.from(provider { files(resolveAbiBaselineJar()) })
    newArchives.from(provider {
        def baseline = resolveAbiBaselineJar()
        files(resolveCurrentAbiJar(baseline))
    })
    txtOutputFile = layout.buildDirectory.file('reports/nexus/japicmp.txt').get().asFile
    htmlOutputFile = layout.buildDirectory.file('reports/nexus/japicmp.html').get().asFile
    mdOutputFile = layout.buildDirectory.file('reports/nexus/japicmp.md').get().asFile
}

tasks.register('checkExampleSourceCompatibility') {
    group = 'verification'
    description = 'Compiles the example projects as the source compatibility check.'
    dependsOn ':example-common:compileJava', ':example-fabric:compileJava', ':example-neoforge:compileJava'
}

tasks.register('generateDocsSite') {
    group = 'documentation'
    description = 'Generates the versioned NexusCore documentation site with client-side search.'
    inputs.dir(file('docs'))
    outputs.dir(layout.buildDirectory.dir('reports/nexus/docs-site'))
    doLast {
        def outDir = layout.buildDirectory.dir('reports/nexus/docs-site').get().asFile
        delete outDir
        outDir.mkdirs()

        def versions = [
                'v1.2': file('docs/v1.2'),
                'v1.1': file('docs/v1.1'),
                'v1.0': file('docs')
        ].findAll { it.value.exists() }

        def searchEntries = []
        def escapeHtml = { value ->
            value.toString()
                    .replace('&', '&amp;')
                    .replace('<', '&lt;')
                    .replace('>', '&gt;')
                    .replace('"', '&quot;')
        }
        def slug = { name -> name.replace('.md', '').replaceAll('[^A-Za-z0-9._-]', '-') }
        def titleOf = { File file ->
            def firstHeading = file.readLines('UTF-8').find { it.startsWith('# ') }
            firstHeading == null ? file.name.replace('.md', '') : firstHeading.substring(2).trim()
        }
        def markdownToHtml = { File file ->
            def html = new StringBuilder()
            boolean inCode = false
            file.eachLine('UTF-8') { line ->
                if (line.startsWith('```')) {
                    html.append(inCode ? '</code></pre>' : '<pre><code>')
                    inCode = !inCode
                } else if (inCode) {
                    html.append(escapeHtml(line)).append('\n')
                } else if (line.startsWith('# ')) {
                    html.append('<h1>').append(escapeHtml(line.substring(2))).append('</h1>')
                } else if (line.startsWith('## ')) {
                    html.append('<h2>').append(escapeHtml(line.substring(3))).append('</h2>')
                } else if (line.startsWith('### ')) {
                    html.append('<h3>').append(escapeHtml(line.substring(4))).append('</h3>')
                } else if (line.startsWith('- ')) {
                    html.append('<p class="bullet">').append(escapeHtml(line)).append('</p>')
                } else if (line.isBlank()) {
                    html.append('\n')
                } else {
                    html.append('<p>').append(escapeHtml(line)).append('</p>')
                }
                html.append('\n')
            }
            return html.toString()
        }

        def nav = new StringBuilder()
        versions.each { version, dir ->
            def docs = fileTree(dir).matching {
                include '*.md'
                if (version == 'v1.0') {
                    exclude 'v1.1/**'
                }
            }.files.sort { it.name }
            docs.each { file ->
                nav.append("<a data-version=\"${version}\" href=\"../${version}/${slug(file.name)}.html\">${escapeHtml(titleOf(file))}</a>\n")
            }
        }

        versions.each { version, dir ->
            def versionDir = new File(outDir, version)
            versionDir.mkdirs()
            def docs = fileTree(dir).matching {
                include '*.md'
                if (version == 'v1.0') {
                    exclude 'v1.1/**'
                }
            }.files.sort { it.name }
            docs.each { file ->
                def title = titleOf(file)
                def htmlFile = new File(versionDir, "${slug(file.name)}.html")
                def body = markdownToHtml(file)
                htmlFile.text = """<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${escapeHtml(title)} - NexusCore ${version}</title>
  <link rel="stylesheet" href="../site.css">
</head>
<body data-version="${version}">
  <header>
    <a class="brand" href="../index.html">NexusCore Docs</a>
    <select id="version-switcher" aria-label="Documentation version">
      ${versions.keySet().collect { "<option value=\"${it}\"${it == version ? ' selected' : ''}>${it}</option>" }.join('\n      ')}
    </select>
    <input id="search" type="search" placeholder="Search docs" autocomplete="off">
  </header>
  <main>
    <nav>${nav}</nav>
    <article>${body}</article>
    <aside id="search-results"></aside>
  </main>
  <script src="../search-index.js"></script>
  <script src="../site.js"></script>
</body>
</html>
"""
                searchEntries << [
                        version: version,
                        title: title,
                        path: "${version}/${htmlFile.name}",
                        text: file.text.replaceAll('\\s+', ' ').trim()
                ]
            }
        }

        new File(outDir, 'index.html').text = """<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>NexusCore Docs</title><link rel="stylesheet" href="site.css"></head>
<body><header><span class="brand">NexusCore Docs</span><select id="version-switcher"><option value="v1.2">v1.2</option><option value="v1.1">v1.1</option><option value="v1.0">v1.0</option></select><input id="search" type="search" placeholder="Search docs"></header><main><article><h1>NexusCore Documentation</h1><p>Select a version or search the complete docs index.</p></article><aside id="search-results"></aside></main><script src="search-index.js"></script><script src="site.js"></script></body>
</html>
"""
        new File(outDir, 'search-index.js').text = "window.NEXUS_DOCS_SEARCH = ${groovy.json.JsonOutput.toJson(searchEntries)};\n"
        new File(outDir, 'site.js').text = """
(function () {
  const select = document.getElementById('version-switcher');
  const search = document.getElementById('search');
  const results = document.getElementById('search-results');
  if (select) {
    select.addEventListener('change', () => {
      const match = (window.NEXUS_DOCS_SEARCH || []).find(entry => entry.version === select.value);
      if (match) window.location.href = (location.pathname.endsWith('/index.html') || !location.pathname.includes('/v')) ? match.path : '../' + match.path;
    });
  }
  if (search && results) {
    search.addEventListener('input', () => {
      const term = search.value.trim().toLowerCase();
      if (!term) { results.innerHTML = ''; return; }
      const hits = (window.NEXUS_DOCS_SEARCH || []).filter(entry => (entry.title + ' ' + entry.text).toLowerCase().includes(term)).slice(0, 12);
      results.innerHTML = '<h2>Search</h2>' + hits.map(entry => '<a href="' + (location.pathname.includes('/v') ? '../' : '') + entry.path + '"><strong>' + entry.title + '</strong><span>' + entry.version + '</span></a>').join('');
    });
  }
})();
"""
        new File(outDir, 'site.css').text = """
body { margin: 0; font-family: system-ui, sans-serif; color: #202428; background: #f7f8fa; }
header { display: flex; gap: 12px; align-items: center; padding: 12px 18px; background: #18202a; color: white; position: sticky; top: 0; }
.brand { color: white; font-weight: 700; text-decoration: none; }
select, input { border: 1px solid #c6ced8; border-radius: 4px; padding: 7px 9px; }
input { min-width: 260px; }
main { display: grid; grid-template-columns: 260px minmax(0, 1fr) 280px; gap: 20px; max-width: 1360px; margin: 0 auto; padding: 22px; }
nav, article, aside { background: white; border: 1px solid #dde3ea; border-radius: 6px; padding: 16px; }
nav a, aside a { display: block; color: #1f5f99; text-decoration: none; margin: 0 0 8px; }
aside a { border-top: 1px solid #edf0f4; padding-top: 8px; }
aside span { display: block; color: #687384; font-size: 12px; }
article { line-height: 1.55; }
pre { background: #111820; color: #e9eef5; padding: 12px; overflow: auto; border-radius: 6px; }
.bullet { padding-left: 12px; }
@media (max-width: 900px) { main { grid-template-columns: 1fr; } input { min-width: 0; width: 100%; } header { flex-wrap: wrap; } }
"""
    }
}

tasks.register('runNexusValidation') {
    group = 'verification'
    description = 'Runs NexusCore release validation tasks and writes CI-friendly reports.'
    dependsOn 'generateApiSurfaceReport', 'checkStableApiCompatibility', 'checkBinaryCompatibility',
            'checkExampleSourceCompatibility', 'generateDocsSite'
    outputs.dir(layout.buildDirectory.dir('reports/nexus'))
    doLast {
        def reportDir = layout.buildDirectory.dir('reports/nexus').get().asFile
        reportDir.mkdirs()
        new File(reportDir, 'validation.json').text = '{"status":"passed","checks":["api","binary-abi","examples","docs-site","metadata"]}' + System.lineSeparator()
        new File(reportDir, 'validation.md').text = '# Nexus Validation\n\nStatus: passed\n\n- API report generated\n- JApiCmp binary compatibility check passed\n- Stable API annotation check passed\n- Example source compatibility passed\n- Versioned docs site generated\n'
    }
}

tasks.register('generateReleaseMetadata') {
    group = 'nexus'
    description = 'Writes release metadata snippets, dependency table, and loader support matrix.'
    outputs.dir(layout.buildDirectory.dir('reports/nexus/release'))
    doLast {
        def dir = layout.buildDirectory.dir('reports/nexus/release').get().asFile
        dir.mkdirs()
        new File(dir, 'dependency-table.md').text = """# Dependency Table

| Dependency | Version |
| --- | --- |
| Minecraft | ${minecraftVersion} |
| Java | ${javaVersion} |
| Architectury | 13.0.8 |
| owo-lib Fabric | 0.12.15.1+1.21 |
| owo-lib NeoForge | 0.12.15-beta.9+1.21 |
| JEI | ${jeiVersion} |
| EMI | ${emiVersion} |
| REI | ${reiVersion} |
| Team Reborn Energy API | ${teamRebornEnergyVersion} |
"""
        new File(dir, 'loader-matrix.md').text = '# Loader Support\n\n| Loader | Supported |\n| --- | --- |\n| Fabric | yes |\n| NeoForge | yes |\n'
        new File(dir, 'release-checklist.md').text = """# Release Checklist

- Run `checkBinaryCompatibility -PnexusApiBaseline=<previous common jar> -PnexusRelease=true`.
- Run `build runNexusValidation generateReleaseMetadata`.
- Run `:fabric:runGametest` and `:neoforge:runGametest`.
- Review `build/reports/nexus/docs-site/index.html`.
- Confirm Fabric and NeoForge GameTest logs finish without Architectury Transformer shutdown traces.
"""
        new File(dir, 'known-issues.md').text = """# Known Release Notes

Architectury Transformer is pinned to 5.2.91 because older 5.2.87 runtimes could print a post-success `StringIndexOutOfBoundsException` from `TransformerRuntime.removeDuplicates` after GameTest shutdown.
"""
    }
}
